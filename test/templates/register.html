<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Last Call — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #c8860a;
      --amber-light: #f0a500;
      --dark: #0d0a07;
      --card: #150f08;
      --border: rgba(200,134,10,0.25);
      --text: #e8dcc8;
      --muted: #8a7a62;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,134,10,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 20%, rgba(200,134,10,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 52px 48px;
      width: 420px;
      position: relative;
      animation: fadeUp 0.6s ease both;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,134,10,0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--amber);
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon { font-size: 32px; display: block; margin-bottom: 12px; }
    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--amber-light);
      letter-spacing: 0.04em;
    }
    .logo p {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--amber); background: rgba(200,134,10,0.05); }
    input::placeholder { color: rgba(138,122,98,0.5); }

    .password-strength {
      margin-top: 6px;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 1px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      border-radius: 1px;
      transition: width 0.3s, background 0.3s;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--amber);
      border: none;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dark);
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--amber-light); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(200,50,50,0.1);
      border: 1px solid rgba(200,50,50,0.3);
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e07070;
      margin-top: 14px;
      display: none;
    }

    .switch-link {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
    }
    .switch-link a { color: var(--amber); text-decoration: none; }
    .switch-link a:hover { color: var(--amber-light); }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🥃</span>
      <h1>The Last Call</h1>
      <p>Create Your Account</p>
    </div>

    <div class="divider"><span>Register</span></div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="your_handle" autocomplete="username"/>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" oninput="checkStrength(this.value)"/>
      <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••"/>
    </div>

    <button class="btn" id="regBtn" onclick="doRegister()">Open a Tab</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="switch-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    function checkStrength(pw) {
      const bar = document.getElementById('strengthBar');
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const widths = ['0%', '25%', '50%', '75%', '100%'];
      const colors = ['transparent', '#c0392b', '#e67e22', '#f1c40f', '#2ecc71'];
      bar.style.width = widths[score];
      bar.style.background = colors[score];
    }

    async function doRegister() {
      const btn = document.getElementById('regBtn');
      const err = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      err.style.display = 'none';

      if (!username || !email || !password || !confirm) {
        err.textContent = 'Please fill in all fields.';
        err.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        err.textContent = 'Password must be at least 6 characters.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/bar';
        } else {
          err.textContent = data.error || 'Registration failed.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Open a Tab';
        }
      } catch {
        err.textContent = 'Server error. Try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Open a Tab';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Last Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #c8860a;
      --amber-light: #f0a500;
      --amber-dim: rgba(200,134,10,0.15);
      --dark: #080604;
      --dark-2: #110d07;
      --dark-3: #1a1209;
      --border: rgba(200,134,10,0.2);
      --text: #e8dcc8;
      --muted: #7a6a52;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── AMBIENT BACKGROUND ───────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,134,10,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 50%, rgba(200,134,10,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ───────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ── HEADER ───────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,6,4,0.8);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon { font-size: 22px; }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--amber-light);
      letter-spacing: 0.06em;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .user-info span { color: var(--amber); }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ── MAIN CONTENT ─────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 420px;
      overflow: hidden;
    }

    /* ── LEFT: BARTENDER SCENE ────────────────────────── */
    .scene {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 48px;
      overflow: hidden;
    }

    /* Bar counter effect */
    .scene::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: linear-gradient(to bottom, transparent, rgba(12,8,4,0.95));
      pointer-events: none;
    }

    /* Bartender illustration */
    .bartender-wrap {
      position: relative;
      width: 340px;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    .bartender-svg {
      width: 100%;
      filter: drop-shadow(0 30px 60px rgba(200,134,10,0.15));
    }

    /* Speaking animation rings */
    .speak-rings {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 6px;
    }
    .speak-rings.active { display: flex; align-items: flex-end; gap: 3px; }

    .speak-bar {
      width: 4px;
      background: var(--amber);
      border-radius: 2px;
      animation: speakBar 0.6s ease-in-out infinite alternate;
    }
    .speak-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .speak-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
    .speak-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
    .speak-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
    .speak-bar:nth-child(5) { height: 8px;  animation-delay: 0.4s; }

    @keyframes speakBar {
      from { transform: scaleY(0.4); opacity: 0.6; }
      to   { transform: scaleY(1); opacity: 1; }
    }

    /* Bartender name plate */
    .name-plate {
      position: relative;
      z-index: 10;
      margin-top: -20px;
      text-align: center;
    }
    .name-plate h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-style: italic;
      color: var(--amber-light);
      text-shadow: 0 0 40px rgba(200,134,10,0.4);
    }
    .name-plate p {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── RIGHT: CHAT PANEL ────────────────────────────── */
    .panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--dark-2);
      overflow: hidden;
    }

    /* Response area */
    .response-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .response-area::-webkit-scrollbar { width: 4px; }
    .response-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: msgIn 0.3s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--dark-3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-avatar { background: var(--amber-dim); border-color: var(--amber); }

    .msg-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1.6;
    }

    .msg.bartender .msg-bubble {
      background: var(--dark-3);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg.user .msg-bubble {
      background: var(--amber-dim);
      border: 1px solid rgba(200,134,10,0.3);
      color: var(--amber-light);
    }

    .msg-time {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 4px;
    }
    .msg.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      gap: 10px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 5px; height: 5px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── INPUT AREA ───────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      background: rgba(8,6,4,0.6);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .text-input-wrap {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--amber); }
    textarea::placeholder { color: rgba(122,106,82,0.5); }

    .btn-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--dark-3);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--amber); color: var(--amber); }
    .btn-icon.recording { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.1); animation: pulse 1s infinite; }
    .btn-icon.speaking  { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(231,76,60,0); }
    }

    .send-btn {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--dark);
    }
    .send-btn:hover { background: var(--amber-light); border-color: var(--amber-light); color: var(--dark); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
    }

    /* ── SCROLLBAR & MISC ─────────────────────────────── */
    .welcome-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }
    .welcome-msg .cheers { font-size: 28px; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="noise"></div>

  <div class="shell">
    <header>
      <div class="brand">
        <span class="brand-icon">🥃</span>
        <h1>The Last Call</h1>
      </div>
      <div class="user-info">
        Logged in as <span>{{ username }}</span>
        <a href="/logout" class="logout-btn">Leave Bar</a>
      </div>
    </header>

    <main>
      <!-- LEFT: Bartender scene -->
      <div class="scene">
        <div class="bartender-wrap">
          <!-- SVG Bartender Illustration -->
          <svg class="bartender-svg" viewBox="0 0 340 480" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Body/Vest -->
            <ellipse cx="170" cy="370" rx="85" ry="110" fill="#1a1005"/>
            <!-- White shirt -->
            <ellipse cx="170" cy="370" rx="60" ry="95" fill="#f0e8d8"/>
            <!-- Vest -->
            <path d="M110 290 L130 480 L210 480 L230 290 C210 320 190 330 170 330 C150 330 130 320 110 290Z" fill="#0d0803"/>
            <!-- Bow tie -->
            <path d="M152 300 L170 312 L188 300 L170 288Z" fill="#c8860a"/>
            <!-- Vest buttons -->
            <circle cx="170" cy="340" r="3" fill="#c8860a" opacity="0.6"/>
            <circle cx="170" cy="360" r="3" fill="#c8860a" opacity="0.6"/>
            <circle cx="170" cy="380" r="3" fill="#c8860a" opacity="0.6"/>
            <!-- Neck -->
            <rect x="155" y="255" width="30" height="40" rx="10" fill="#b8936a"/>
            <!-- Head -->
            <ellipse cx="170" cy="215" rx="58" ry="68" fill="#c4956e"/>
            <!-- Hair -->
            <ellipse cx="170" cy="158" rx="56" ry="28" fill="#2c1a08"/>
            <path d="M115 185 Q112 155 125 148 Q150 138 170 140 Q190 138 215 148 Q228 155 225 185" fill="#2c1a08"/>
            <!-- Sideburns -->
            <rect x="113" y="188" width="14" height="24" rx="5" fill="#2c1a08"/>
            <rect x="213" y="188" width="14" height="24" rx="5" fill="#2c1a08"/>
            <!-- Ears -->
            <ellipse cx="113" cy="215" rx="10" ry="13" fill="#b8856a"/>
            <ellipse cx="227" cy="215" rx="10" ry="13" fill="#b8856a"/>
            <!-- Eyes -->
            <ellipse cx="150" cy="210" rx="10" ry="11" fill="white"/>
            <ellipse cx="190" cy="210" rx="10" ry="11" fill="white"/>
            <circle cx="152" cy="212" r="6" fill="#2c1a08"/>
            <circle cx="192" cy="212" r="6" fill="#2c1a08"/>
            <circle cx="154" cy="210" r="2" fill="white"/>
            <circle cx="194" cy="210" r="2" fill="white"/>
            <!-- Eyebrows -->
            <path d="M140 198 Q150 192 162 197" stroke="#2c1a08" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M178 197 Q190 192 200 198" stroke="#2c1a08" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- Nose -->
            <path d="M166 218 Q162 228 155 232 Q163 237 170 235 Q177 237 185 232 Q178 228 174 218" fill="#a87855" opacity="0.6"/>
            <!-- Smile -->
            <path d="M152 248 Q170 262 188 248" stroke="#8a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M155 252 Q170 262 185 252" fill="#e8a090" opacity="0.5"/>
            <!-- Mustache -->
            <path d="M154 244 Q162 250 170 246 Q178 250 186 244" fill="#2c1a08"/>
            <!-- Left arm holding shaker -->
            <path d="M110 300 Q75 330 65 380 Q60 400 70 410 L90 405 Q85 395 88 375 Q95 345 125 325Z" fill="#1a1005"/>
            <!-- Right arm raised -->
            <path d="M230 300 Q265 340 280 300 Q290 270 275 255 L260 262 Q270 275 262 295 Q248 325 215 320Z" fill="#1a1005"/>
            <!-- Cocktail shaker in left hand -->
            <rect x="52" y="390" width="28" height="50" rx="6" fill="#8a8a8a"/>
            <rect x="55" y="390" width="22" height="16" rx="4" fill="#aaa"/>
            <rect x="54" y="406" width="24" height="3" fill="#666"/>
            <ellipse cx="66" cy="438" rx="10" ry="5" fill="#777"/>
            <!-- Glass in right hand -->
            <path d="M262 248 L272 248 L278 278 L256 278Z" fill="rgba(180,220,255,0.3)" stroke="rgba(180,220,255,0.5)" stroke-width="1"/>
            <ellipse cx="267" cy="248" rx="6" ry="2.5" fill="rgba(180,220,255,0.4)"/>
            <!-- Drink in glass -->
            <path d="M258 268 L276 268 L278 278 L256 278Z" fill="rgba(200,134,10,0.5)"/>
            <!-- Garnish/olive on pick -->
            <line x1="267" y1="248" x2="267" y2="240" stroke="#8a6a2a" stroke-width="1"/>
            <circle cx="267" cy="238" r="4" fill="#2e7d32"/>
          </svg>
        </div>

        <!-- Speaking animation -->
        <div class="speak-rings" id="speakRings">
          <div class="speak-bar"></div>
          <div class="speak-bar"></div>
          <div class="speak-bar"></div>
          <div class="speak-bar"></div>
          <div class="speak-bar"></div>
        </div>

        <div class="name-plate">
          <h2>Rex</h2>
          <p>Your AI Bartender · Est. 2024</p>
        </div>
      </div>

      <!-- RIGHT: Chat panel -->
      <div class="panel">
        <div class="response-area" id="responseArea">
          <div class="welcome-msg" id="welcomeMsg">
            <span class="cheers">🍹</span>
            Pull up a stool.<br/>
            Rex is behind the bar tonight.<br/>
            Ask about a cocktail, share your mood,<br/>
            or just say hello.
          </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator" style="padding: 0 24px 12px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--dark-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">🍸</div>
          <div class="typing-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <!-- Mic button -->
            <button class="btn-icon" id="micBtn" title="Hold to speak" onclick="toggleMic()">🎙️</button>

            <div class="text-input-wrap">
              <textarea
                id="userInput"
                placeholder="Ask Rex anything about drinks..."
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
              ></textarea>
            </div>

            <!-- TTS toggle -->
            <button class="btn-icon" id="ttsBtn" title="Toggle voice response" onclick="toggleTTS()">🔊</button>

            <!-- Send button -->
            <button class="btn-icon send-btn" id="sendBtn" title="Send" onclick="sendMessage()">➤</button>
          </div>
          <div class="hint">Press Enter to send · Shift+Enter for new line · 🎙️ to use voice</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ── STATE ──────────────────────────────────────────────────
    let ttsEnabled = true;
    let isRecording = false;
    let recognition = null;
    let currentAudio = null;

    // ── AUTO-RESIZE TEXTAREA ───────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── KEYBOARD HANDLER ──────────────────────────────────────
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ── TOGGLE TTS ────────────────────────────────────────────
    function toggleTTS() {
      ttsEnabled = !ttsEnabled;
      const btn = document.getElementById('ttsBtn');
      btn.textContent = ttsEnabled ? '🔊' : '🔇';
      btn.title = ttsEnabled ? 'Voice ON – click to mute' : 'Voice OFF – click to enable';
    }

    // ── MICROPHONE / SPEECH RECOGNITION ───────────────────────
    function toggleMic() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        addMessage('bartender', "Sorry, your browser doesn't support voice input. Try Chrome or Edge.");
        return;
      }

      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('userInput').value = transcript;
        stopRecording();
        sendMessage();
      };

      recognition.onerror = () => stopRecording();
      recognition.onend = () => stopRecording();

      recognition.start();
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
    }

    function stopRecording() {
      if (recognition) { recognition.stop(); recognition = null; }
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎙️';
    }

    // ── ADD MESSAGE TO UI ──────────────────────────────────────
    function addMessage(role, text) {
      const welcome = document.getElementById('welcomeMsg');
      if (welcome) welcome.remove();

      const area = document.getElementById('responseArea');
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const isUser = role === 'user';
      const wrap = document.createElement('div');
      wrap.className = `msg ${isUser ? 'user' : 'bartender'}`;
      wrap.innerHTML = `
        <div class="msg-avatar">${isUser ? '👤' : '🍸'}</div>
        <div>
          <div class="msg-bubble">${escHtml(text)}</div>
          <div class="msg-time">${now}</div>
        </div>
      `;
      area.appendChild(wrap);
      area.scrollTop = area.scrollHeight;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    // ── TYPING INDICATOR ──────────────────────────────────────
    function showTyping() {
      document.getElementById('typingIndicator').classList.add('visible');
      document.getElementById('responseArea').scrollTop = document.getElementById('responseArea').scrollHeight;
    }
    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('visible');
    }

    // ── TEXT TO SPEECH ────────────────────────────────────────
    async function speakResponse(text) {
      if (!ttsEnabled) return;

      const speakRings = document.getElementById('speakRings');
      const ttsBtn = document.getElementById('ttsBtn');

      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) {
          // Fallback to browser TTS
          speakBrowser(text);
          return;
        }

        const data = await res.json();
        if (data.error) { speakBrowser(text); return; }

        // Decode base64 audio
        const audioBytes = atob(data.audio);
        const buffer = new Uint8Array(audioBytes.length);
        for (let i = 0; i < audioBytes.length; i++) buffer[i] = audioBytes.charCodeAt(i);

        const blob = new Blob([buffer], { type: data.format === 'wav' ? 'audio/wav' : 'audio/pcm' });
        const url = URL.createObjectURL(blob);

        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        currentAudio = new Audio(url);
        currentAudio.onplay = () => {
          speakRings.classList.add('active');
          ttsBtn.classList.add('speaking');
        };
        currentAudio.onended = currentAudio.onerror = () => {
          speakRings.classList.remove('active');
          ttsBtn.classList.remove('speaking');
          URL.revokeObjectURL(url);
        };
        await currentAudio.play();

      } catch {
        speakBrowser(text); // Fallback
      }
    }

    // Browser Web Speech API fallback
    function speakBrowser(text) {
      if (!window.speechSynthesis) return;
      const speakRings = document.getElementById('speakRings');
      const ttsBtn = document.getElementById('ttsBtn');
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      utt.pitch = 0.9;
      // Pick a deeper voice if available
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v => v.name.includes('Daniel') || v.name.includes('Alex') || v.name.includes('Google UK'));
      if (preferred) utt.voice = preferred;
      utt.onstart  = () => { speakRings.classList.add('active');  ttsBtn.classList.add('speaking'); };
      utt.onend    = () => { speakRings.classList.remove('active'); ttsBtn.classList.remove('speaking'); };
      utt.onerror  = () => { speakRings.classList.remove('active'); ttsBtn.classList.remove('speaking'); };
      speechSynthesis.speak(utt);
    }

    // ── SEND MESSAGE ──────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        hideTyping();

        if (data.reply) {
          addMessage('bartender', data.reply);
          speakResponse(data.reply);
        } else {
          addMessage('bartender', data.error || "Hmm, something went wrong behind the bar. Try again?");
        }
      } catch {
        hideTyping();
        addMessage('bartender', "Lost connection to the bar. Check that Ollama is running.");
      }

      sendBtn.disabled = false;
      input.focus();
    }

    // Pre-load voices for browser TTS
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  </script>
</body>
</html>

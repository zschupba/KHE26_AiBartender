<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Last Call — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #c8860a;
      --amber-light: #f0a500;
      --dark: #0d0a07;
      --dark-2: #1a1209;
      --card: #150f08;
      --border: rgba(200,134,10,0.25);
      --text: #e8dcc8;
      --muted: #8a7a62;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,134,10,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 20%, rgba(200,134,10,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 52px 48px;
      width: 420px;
      position: relative;
      animation: fadeUp 0.6s ease both;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,134,10,0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--amber);
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 12px;
      filter: sepia(1) saturate(2);
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--amber-light);
      line-height: 1;
    }

    .logo p {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--amber);
      background: rgba(200,134,10,0.05);
    }

    input::placeholder { color: rgba(138,122,98,0.5); }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--amber);
      border: none;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dark);
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { background: var(--amber-light); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(200,50,50,0.1);
      border: 1px solid rgba(200,50,50,0.3);
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e07070;
      margin-top: 16px;
      display: none;
    }

    .switch-link {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
    }

    .switch-link a {
      color: var(--amber);
      text-decoration: none;
      transition: color 0.2s;
    }
    .switch-link a:hover { color: var(--amber-light); }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">🥃</span>
      <h1>The Last Call</h1>
      <p>AI Bartender Experience</p>
    </div>

    <div class="divider"><span>Sign In</span></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="your_handle" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Enter the Bar</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="switch-link">
      No account? <a href="/register">Create one</a>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      err.style.display = 'none';
      if (!username || !password) {
        err.textContent = 'Please fill in all fields.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Checking...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/bar';
        } else {
          err.textContent = data.error || 'Login failed.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Enter the Bar';
        }
      } catch {
        err.textContent = 'Server error. Try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enter the Bar';
      }
    }
  </script>
</body>
</html>
